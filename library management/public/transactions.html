<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Transactions — Issue and return books, view transaction history.">
    <title>Transactions — LibraryMS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
                <div><div class="sidebar-title">LibraryMS</div><div class="sidebar-subtitle">Management System</div></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="/dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
                <a href="/books.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Book Catalog</a>
                <div class="nav-section-title admin-only">Management</div>
                <a href="/members.html" class="nav-link admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Members</a>
                <a href="/transactions.html" class="nav-link active admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Transactions</a>
                <a href="/reports.html" class="nav-link admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Reports</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user" onclick="Auth.logout()">
                    <div class="sidebar-avatar" id="user-avatar">A</div>
                    <div class="sidebar-user-info"><div class="sidebar-user-name" id="user-name">Admin</div><div class="sidebar-user-role" id="user-role">admin</div></div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-tertiary)"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <button class="sidebar-toggle" id="sidebar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                    <h1 class="page-title">Transactions</h1>
                    <p class="page-subtitle">Issue, return, and track book transactions</p>
                </div>
                <div class="flex gap-2">
                    <button class="btn btn-primary" onclick="openIssueModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        Issue Book
                    </button>
                    <button class="btn btn-secondary" onclick="openReturnModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        Return Book
                    </button>
                </div>
            </div>

            <div class="page-body">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <select class="form-select" id="status-filter" style="width:auto; min-width:140px;">
                            <option value="">All Status</option>
                            <option value="issued">Issued</option>
                            <option value="returned">Returned</option>
                        </select>
                    </div>
                </div>
                <div id="transactions-container">
                    <div class="loader"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Issue Book Modal -->
    <div class="modal-overlay" id="issue-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Issue Book</h3>
                <button class="modal-close" onclick="Modal.close('issue-modal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="modal-body">
                <form id="issue-form" onsubmit="handleIssue(event)">
                    <div class="form-group">
                        <label class="form-label" for="issue-member-id">Member ID *</label>
                        <input class="form-input" type="number" id="issue-member-id" required placeholder="Enter Member ID" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="issue-book-id">Book ID *</label>
                        <input class="form-input" type="number" id="issue-book-id" required placeholder="Enter Book ID" min="1">
                    </div>
                    <div class="modal-footer" style="padding:0; border:none; margin-top:var(--space-4)">
                        <button type="button" class="btn btn-secondary" onclick="Modal.close('issue-modal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Issue Book</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Return Book Modal -->
    <div class="modal-overlay" id="return-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Return Book</h3>
                <button class="modal-close" onclick="Modal.close('return-modal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="modal-body">
                <form id="return-form" onsubmit="handleReturn(event)">
                    <div class="form-group">
                        <label class="form-label" for="return-member-id">Member ID *</label>
                        <input class="form-input" type="number" id="return-member-id" required placeholder="Enter Member ID" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="return-book-id">Book ID *</label>
                        <input class="form-input" type="number" id="return-book-id" required placeholder="Enter Book ID" min="1">
                    </div>
                    <div class="modal-footer" style="padding:0; border:none; margin-top:var(--space-4)">
                        <button type="button" class="btn btn-secondary" onclick="Modal.close('return-modal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Return Book</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/transactions.js"></script>
</body>
</html>
