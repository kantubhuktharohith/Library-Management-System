<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book Catalog — Browse, search, and manage the library book collection.">
    <title>Book Catalog — LibraryMS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                </div>
                <div>
                    <div class="sidebar-title">LibraryMS</div>
                    <div class="sidebar-subtitle">Management System</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="/dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
                <a href="/books.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Book Catalog</a>
                <a href="/requests.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Book Requests</a>
                <div class="nav-section-title admin-only">Management</div>
                <a href="/members.html" class="nav-link admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Members</a>
                <a href="/transactions.html" class="nav-link admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Transactions</a>
                <a href="/reports.html" class="nav-link admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Reports</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user" onclick="Auth.logout()">
                    <div class="sidebar-avatar" id="user-avatar">A</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name" id="user-name">Admin</div>
                        <div class="sidebar-user-role" id="user-role">admin</div>
                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-tertiary)"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <button class="sidebar-toggle" id="sidebar-toggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title">Book Catalog</h1>
                    <p class="page-subtitle">Browse and manage library books</p>
                </div>
                <button class="btn btn-primary admin-only" id="btn-add-book" onclick="openAddBookModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Book
                </button>
            </div>

            <div class="page-body">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="search-input-group">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input class="form-input" id="book-search" type="text" placeholder="Search by title, author, or ISBN...">
                        </div>
                    </div>
                    <div class="toolbar-right">
                        <select class="form-select" id="category-filter" style="width:auto; min-width:150px;">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                </div>

                <div id="books-container">
                    <div class="loader"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Book Modal -->
    <div class="modal-overlay" id="book-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="book-modal-title">Add Book</h3>
                <button class="modal-close" onclick="Modal.close('book-modal')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="book-form" onsubmit="handleBookSubmit(event)">
                    <input type="hidden" id="book-edit-id">
                    <div class="form-group">
                        <label class="form-label" for="book-title">Title *</label>
                        <input class="form-input" type="text" id="book-title" required placeholder="Enter book title">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="book-author">Author *</label>
                        <input class="form-input" type="text" id="book-author" required placeholder="Enter author name">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="book-publisher">Publisher</label>
                            <input class="form-input" type="text" id="book-publisher" placeholder="Publisher name">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="book-category">Category</label>
                            <input class="form-input" type="text" id="book-category" placeholder="e.g. Computer Science">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="book-isbn">ISBN</label>
                            <input class="form-input" type="text" id="book-isbn" placeholder="ISBN number">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="book-quantity">Quantity *</label>
                            <input class="form-input" type="number" id="book-quantity" min="1" value="1" required>
                        </div>
                    </div>
                    <div class="modal-footer" style="padding:0; border:none; margin-top:var(--space-4)">
                        <button type="button" class="btn btn-secondary" onclick="Modal.close('book-modal')">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="book-submit-btn">Add Book</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/books.js"></script>
</body>
</html>
