<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Library Management System — Streamline your library operations with automated book tracking, member management, and reporting.">
    <title>Library Management System — Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <div class="login-logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <h1>LibraryMS</h1>
                    <p>Library Management System</p>
                </div>

                <!-- Tabs -->
                <div class="login-tabs">
                    <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                    <button class="login-tab" id="tab-register" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="login-email">Email Address</label>
                        <input class="form-input" type="email" id="login-email" placeholder="admin@library.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="login-password">Password</label>
                        <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
                        Sign In
                    </button>
                    <p class="text-center text-muted mt-4" style="font-size: var(--font-size-xs);">
                        Demo: <strong>admin@library.com</strong> / <strong>admin123</strong>
                    </p>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label" for="reg-name">Full Name</label>
                        <input class="form-input" type="text" id="reg-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-email">Email Address</label>
                        <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-phone">Phone Number</label>
                        <input class="form-input" type="tel" id="reg-phone" placeholder="9876543210" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="reg-type">Membership Type</label>
                            <select class="form-select" id="reg-type">
                                <option value="Student">Student</option>
                                <option value="Faculty">Faculty</option>
                                <option value="Guest">Guest</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="reg-password">Password</label>
                            <input class="form-input" type="password" id="reg-password" placeholder="••••••••" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
                        Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Check if already logged in
        (async () => {
            const user = await Auth.check();
            if (user) window.location.href = '/dashboard.html';
        })();

        function switchTab(tab) {
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                await Auth.login(email, password);
                Toast.success('Login successful! Redirecting...');
                setTimeout(() => window.location.href = '/dashboard.html', 500);
            } catch (err) {
                Toast.error(err.message);
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                await Auth.register({
                    name: document.getElementById('reg-name').value,
                    email: document.getElementById('reg-email').value,
                    phone: document.getElementById('reg-phone').value,
                    membershipType: document.getElementById('reg-type').value,
                    password: document.getElementById('reg-password').value,
                });
                Toast.success('Account created! Please sign in.');
                switchTab('login');
                document.getElementById('login-email').value = document.getElementById('reg-email').value;
            } catch (err) {
                Toast.error(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
